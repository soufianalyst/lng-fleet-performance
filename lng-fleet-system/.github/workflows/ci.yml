name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.14-pg16
        env:
          POSTGRES_DB: lngfleet
          POSTGRES_USER: lngfleet
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v4

      - name: Test
        run: go test ./... -v -count=1
        env:
          DB_URL: postgres://lngfleet:test@localhost:5432/lngfleet?sslmode=disable

      - name: Build
        run: go build ./cmd/server

  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Type Check
        run: npx tsc --noEmit

  edge:
    name: Edge Gateway (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: edge

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  ml-pipeline:
    name: ML Pipeline (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Lint
        run: pip install ruff && ruff check pipeline/

      - name: Test imports
        run: python -c "from pipeline.cii_forecaster import CIICIIForecaster; from pipeline.anomaly_detection import EngineAnomalyDetector; from pipeline.bor_predictor import BORPredictor; print('All imports OK')"

  synthetic-data:
    name: Synthetic Data Generator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synthetic-data-generator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: synthetic-data-generator/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Generate Data
        run: python run.py --csv

      - name: Validate Output
        run: |
          for f in output/*.csv; do
            lines=$(wc -l < "$f")
            echo "$f: $lines lines"
            if [ "$lines" -lt 2 ]; then
              echo "ERROR: $f is empty"
              exit 1
            fi
          done

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, edge]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/api-gateway.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
