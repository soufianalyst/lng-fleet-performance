apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lngfleet

resources:
  - namespace.yaml
  - api-gateway.yaml
  - frontend.yaml

secretGenerator:
  - name: db-secret
    envs:
      - .secrets/db.env
  - name: redis-secret
    envs:
      - .secrets/redis.env
  - name: jwt-secret
    envs:
      - .secrets/jwt.env

configMapGenerator:
  - name: app-config
    literals:
      - ENV=production
      - LOG_LEVEL=info
